version: '3.8'

services:
  pg-primary:
    image: bitnami/postgresql:latest
    container_name: pg-primary
    ports:
      - "5432:5432"
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=123
      - POSTGRESQL_DATABASE=db
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=replicator
      - POSTGRESQL_REPLICATION_PASSWORD=123
    volumes:
      - pg-primary-data:/bitnami/postgresql
    networks:
      pgnet:
        ipv4_address: 172.16.1.2

  pg-replica:
    image: bitnami/postgresql:latest
    container_name: pg-replica
    ports:
      - "5433:5432"
    environment:
      - POSTGRESQL_PASSWORD=123
      - POSTGRESQL_DATABASE=db
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=replicator
      - POSTGRESQL_REPLICATION_PASSWORD=123
      - POSTGRESQL_MASTER_HOST=pg-primary
    volumes:
      - pg-replica-data:/bitnami/postgresql
    networks:
      pgnet:
        ipv4_address: 172.16.1.3
    depends_on:
      - pg-primary


  pg-exporter-primary:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pg-exporter-primary
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:123@pg-primary:5432/db?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      pgnet:
        ipv4_address: 172.16.1.4
    depends_on:
      - pg-primary

  pg-exporter-replica:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pg-exporter-replica
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:123@pg-replica:5432/db?sslmode=disable"
    ports:
      - "9188:9187"
    networks:
      pgnet:
        ipv4_address: 172.16.1.5
    depends_on:
      - pg-replica

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      pgnet:
        ipv4_address: 172.16.1.10

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
    networks:
      pgnet:
        ipv4_address: 172.16.1.11

volumes:
  pg-primary-data:
  pg-replica-data:
  grafana-data:

networks:
  pgnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24
